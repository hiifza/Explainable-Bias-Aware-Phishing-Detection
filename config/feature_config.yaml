# ── Correlation thresholds used during audit ─────────────────────────────────
correlation_thresholds:
  high:   0.75   # pairs flagged as high multicollinearity
  medium: 0.50   # pairs reviewed but retained
  low:    0.30   # informational only

# ── Near-constant variance threshold ─────────────────────────────────────────
near_constant_threshold: 0.95   # features where top value > 95% of samples
